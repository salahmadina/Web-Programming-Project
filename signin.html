<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – SparkWash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a class="logo" href="main.html">&#128167; SparkWash</a>
    <div class="nav-links">
        <a href="signin.html">Sign In</a>
        <a href="signup.html">Sign Up</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="card">
        <h1>&#128167; Sign In</h1>
        <div id="signinAlert" class="alert"></div>
        <form id="signinForm" action="signin.php" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="card-footer">
            Don't have an account? <a href="signup.html">Create one</a>
        </div>
    </div>
</div>

<footer>&copy; 2025 <span>SparkWash</span>. All rights reserved.</footer>

<script src="script.js"></script>
</body>
</html>
