<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SparkleWash</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="auth-wrapper">

    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">&#9992;</span>
        <span class="logo-text">SparkleWash</span>
      </div>

      <h1>Welcome Back</h1>
      <p class="auth-sub">Sign in to manage your bookings</p>

      <!-- Alert messages from PHP redirects -->
      <div id="alert" class="alert" style="display:none;"></div>

      <form id="loginForm" action="../php/login.php" method="POST" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" required>
          <span class="field-error" id="emailErr"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-eye-wrap">
            <input type="password" id="password" name="password"
                   placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="eye-btn" id="togglePwd">&#128065;</button>
          </div>
          <span class="field-error" id="pwdErr"></span>
        </div>

        <button type="submit" class="btn-submit">Login</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>

  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
